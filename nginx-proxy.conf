# Nginx 配置 - 42.194.200.69 服务器
# 用于转发 portal.kedouai.com 到新服务器 106.52.176.246

server {
    listen 80;
    server_name portal.kedouai.com;

    # 重定向到 HTTPS（如果配置了 SSL）
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://106.52.176.246:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 访问日志
    access_log /var/log/nginx/portal.kedouai.com.access.log;
    error_log /var/log/nginx/portal.kedouai.com.error.log;
}

