<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>科豆 AI · 橙色色系方案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:40px}
h1{text-align:center;font-size:24px;margin-bottom:6px}
.sub{text-align:center;color:#555;font-size:13px;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:960px;margin:0 auto}
.card{background:#141414;border-radius:16px;padding:28px;border:1px solid #222}
.card h3{font-size:17px;margin-bottom:6px}
.card .desc{font-size:12px;color:#666;margin-bottom:16px}
.swatch{display:flex;gap:6px;margin-bottom:20px}
.dot{width:32px;height:32px;border-radius:8px;flex-shrink:0}
.code{font-size:10px;color:#555;text-align:center;margin-top:2px}

.logo-area{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.logo-bg-dark{background:#0a0a0a;border-radius:12px;padding:16px;text-align:center;flex:1}
.logo-bg-light{background:#fff;border-radius:12px;padding:16px;text-align:center;flex:1}
.logo-label{font-size:10px;color:#555;margin-top:4px}

.btn-row{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.btn{height:36px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:600;cursor:default}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}
.tag-rec{background:#2a2a2a;color:#aaa}
</style>
</head>
<body>

<h1>科豆 AI · 橙色主色系</h1>
<p class="sub">三个方向，确定后全局替换</p>

<div class="grid">

<!-- 方案 1：暖橙 -->
<div class="card">
  <h3>方案一 · 暖橙 <span class="tag tag-rec">推荐</span></h3>
  <p class="desc">明亮有活力，适合教育/C端产品，亲和力强</p>
  <div class="swatch">
    <div><div class="dot" style="background:#f97316"></div><div class="code">#f97316</div></div>
    <div><div class="dot" style="background:#ea580c"></div><div class="code">#ea580c</div></div>
    <div><div class="dot" style="background:#fed7aa"></div><div class="code">#fed7aa</div></div>
    <div><div class="dot" style="background:#fff7ed"></div><div class="code">bg</div></div>
  </div>
  <div class="logo-area">
    <div class="logo-bg-dark">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#f97316"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#fb923c"/>
        <circle cx="20" cy="10" r="1.8" fill="#ea580c"/>
        <circle cx="26" cy="13" r="1.8" fill="#fb923c"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#ea580c" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#ea580c" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">暗底</div>
    </div>
    <div class="logo-bg-light">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#f97316"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#fb923c"/>
        <circle cx="20" cy="10" r="1.8" fill="#ea580c"/>
        <circle cx="26" cy="13" r="1.8" fill="#fb923c"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#ea580c" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#ea580c" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">亮底</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" style="background:#f97316">主按钮</button>
    <button class="btn" style="background:transparent;border:1px solid #f97316;color:#f97316">次按钮</button>
  </div>
</div>

<!-- 方案 2：琥珀橙 -->
<div class="card">
  <h3>方案二 · 琥珀橙</h3>
  <p class="desc">偏黄调，温暖复古，类似 Notion/Craft 的气质</p>
  <div class="swatch">
    <div><div class="dot" style="background:#d97706"></div><div class="code">#d97706</div></div>
    <div><div class="dot" style="background:#b45309"></div><div class="code">#b45309</div></div>
    <div><div class="dot" style="background:#fde68a"></div><div class="code">#fde68a</div></div>
    <div><div class="dot" style="background:#fffbeb"></div><div class="code">bg</div></div>
  </div>
  <div class="logo-area">
    <div class="logo-bg-dark">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#d97706"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#eab308"/>
        <circle cx="20" cy="10" r="1.8" fill="#b45309"/>
        <circle cx="26" cy="13" r="1.8" fill="#eab308"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#b45309" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#b45309" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">暗底</div>
    </div>
    <div class="logo-bg-light">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#d97706"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#eab308"/>
        <circle cx="20" cy="10" r="1.8" fill="#b45309"/>
        <circle cx="26" cy="13" r="1.8" fill="#eab308"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#b45309" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#b45309" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">亮底</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" style="background:#d97706">主按钮</button>
    <button class="btn" style="background:transparent;border:1px solid #d97706;color:#d97706">次按钮</button>
  </div>
</div>

<!-- 方案 3：深橙 -->
<div class="card">
  <h3>方案三 · 深橙</h3>
  <p class="desc">偏红调，沉稳有力，类似 Linear/Vercel 的深色感</p>
  <div class="swatch">
    <div><div class="dot" style="background:#ea580c"></div><div class="code">#ea580c</div></div>
    <div><div class="dot" style="background:#c2410c"></div><div class="code">#c2410c</div></div>
    <div><div class="dot" style="background:#fed7aa"></div><div class="code">#fed7aa</div></div>
    <div><div class="dot" style="background:#fff7ed"></div><div class="code">bg</div></div>
  </div>
  <div class="logo-area">
    <div class="logo-bg-dark">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#ea580c"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#f97316"/>
        <circle cx="20" cy="10" r="1.8" fill="#c2410c"/>
        <circle cx="26" cy="13" r="1.8" fill="#f97316"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#c2410c" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#c2410c" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">暗底</div>
    </div>
    <div class="logo-bg-light">
      <svg viewBox="0 0 40 40" width="56" height="56">
        <ellipse cx="20" cy="18" rx="13" ry="14" fill="#ea580c"/>
        <ellipse cx="20" cy="17" rx="8" ry="9" fill="#fff" opacity=".2"/>
        <circle cx="14" cy="13" r="1.8" fill="#f97316"/>
        <circle cx="20" cy="10" r="1.8" fill="#c2410c"/>
        <circle cx="26" cy="13" r="1.8" fill="#f97316"/>
        <line x1="14" y1="13" x2="20" y2="10" stroke="#c2410c" stroke-width="1" stroke-linecap="round"/>
        <line x1="20" y1="10" x2="26" y2="13" stroke="#c2410c" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <div class="logo-label">亮底</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" style="background:#ea580c">主按钮</button>
    <button class="btn" style="background:transparent;border:1px solid #ea580c;color:#ea580c">次按钮</button>
  </div>
</div>

</div>

</body>
</html>
