# Nginx 配置 - 106.52.176.246 服务器
# Web System 生产环境配置

# Gzip 压缩 — 大幅减小 JS/CSS 体积
gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2
    application/vnd.ms-fontobject;

# 浏览器缓存 — 静态资源强缓存
map $sent_http_content_type $expires {
    default                    off;
    application/javascript     365d;
    text/css                   365d;
    image/png                  365d;
    image/jpeg                 365d;
    image/gif                  365d;
    image/svg+xml              365d;
    font/woff                  365d;
    font/woff2                 365d;
}

# 少儿教育门户
server {
    listen 80;
    server_name portal.kedouai.com;

    root /home/ubuntu/web_system/portal/dist;
    index index.html;
    expires $expires;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;
}

# 管理后台
server {
    listen 80;
    server_name admin.kedouai.com dev.kedouai.com;

    root /home/ubuntu/web_system/admin-web/dist;
    index index.html;
    expires $expires;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    access_log /var/log/nginx/admin.access.log;
    error_log /var/log/nginx/admin.error.log;
}
