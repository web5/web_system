# Nginx 配置 - 106.52.176.246 服务器
# Web System 生产环境配置

# 少儿教育门户
server {
    listen 80;
    server_name portal.kedouai.com;

    root /home/ubuntu/web_system/portal/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;
}

# 管理后台
server {
    listen 80;
    server_name admin.kedouai.com;

    root /home/ubuntu/web_system/admin-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    access_log /var/log/nginx/admin.access.log;
    error_log /var/log/nginx/admin.error.log;
}
