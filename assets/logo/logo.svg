<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="beanBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C"/>
      <stop offset="40%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#C2410C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7C2D12" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 橙色光晕 -->
  <circle cx="60" cy="60" r="55" fill="url(#glow)"/>

  <!-- 地面阴影 -->
  <ellipse cx="60" cy="100" rx="26" ry="6" fill="#7C2D12" opacity="0.1"/>

  <!-- 豆子身体 -->
  <path d="M60,18 C85,18 104,34 104,56 C104,80 85,100 60,100 C35,100 16,80 16,56 C16,34 35,18 60,18 Z"
        fill="url(#beanBody)" filter="url(#shadow)"/>

  <!-- 豆子缝线 -->
  <path d="M20,52 Q60,78 100,52" fill="none" stroke="#C2410C" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- 左眼 — 简洁圆眼 -->
  <ellipse cx="44" cy="48" rx="7" ry="8" fill="#FFFFFF"/>
  <circle cx="45.5" cy="49.5" r="3.5" fill="#7C2D12"/>

  <!-- 右眼 — 简洁圆眼 -->
  <ellipse cx="76" cy="48" rx="7" ry="8" fill="#FFFFFF"/>
  <circle cx="77.5" cy="49.5" r="3.5" fill="#7C2D12"/>

  <!-- 学位帽 — 简洁斜戴 -->
  <g transform="translate(42,4) rotate(-6)">
    <path d="M-4,4 L18,-12 L38,4 L30,7 L14,-7 L-2,7Z" fill="url(#capGrad)"/>
    <rect x="-4" y="4" width="4" height="9" rx="1.5" fill="#9A3412"/>
    <line x1="-4" y1="11" x2="-14" y2="16" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="-15" cy="17.5" r="2.5" fill="#F97316"/>
  </g>
</svg>
