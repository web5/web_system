<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  body { margin: 0; padding: 20px; background: #fff; display: flex; flex-wrap: wrap; gap: 30px; align-items: center; }
  .card { padding: 10px; }
  .label { font-family: sans-serif; font-size: 11px; color: #999; text-align: center; margin-top: 6px; }
</style></head><body>
  <div class="card">
    <div id="icon">
      <svg width="210" height="110" viewBox="0 0 210 110" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="210" height="110" rx="55" fill="#F97316"/>
        <path d="M 105 18 C 127 18, 139 34, 139 60 C 139 90, 121 102, 105 102 C 87 102, 71 88, 71 60 C 71 32, 87 18, 105 18 Z" fill="white"/>
        <circle cx="105" cy="60" r="9" fill="#F97316"/>
        <circle cx="105" cy="58" r="3.5" fill="#FDE68A"/>
        <path d="M 105 18 Q 105 10, 105 7" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="105" cy="6" r="3.5" fill="white"/>
      </svg>
    </div>
    <div class="label">logo-icon（纯图标）</div>
  </div>
  <div class="card">
    <div id="lockup">
      <svg width="400" height="110" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="210" height="110" rx="55" fill="#F97316"/>
        <path d="M 105 18 C 127 18, 139 34, 139 60 C 139 90, 121 102, 105 102 C 87 102, 71 88, 71 60 C 71 32, 87 18, 105 18 Z" fill="white"/>
        <circle cx="105" cy="60" r="9" fill="#F97316"/>
        <circle cx="105" cy="58" r="3.5" fill="#FDE68A"/>
        <path d="M 105 18 Q 105 10, 105 7" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="105" cy="6" r="3.5" fill="white"/>
        <text x="250" y="52" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700" fill="#1C1917" letter-spacing="2">科豆</text>
        <text x="250" y="92" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700" fill="#F97316" letter-spacing="2">AI</text>
      </svg>
    </div>
    <div class="label">logo-horizontal-lockup（带文字横版）</div>
  </div>
  <div class="card">
    <div id="app">
      <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="96" height="96" rx="22" fill="#F97316"/>
        <path d="M 48 20 C 62 20, 72 30, 72 48 C 72 68, 62 76, 48 76 C 34 76, 24 66, 24 48 C 24 30, 34 20, 48 20 Z" fill="white"/>
        <circle cx="48" cy="48" r="8" fill="#F97316"/>
        <circle cx="48" cy="47" r="3" fill="#FDE68A"/>
      </svg>
    </div>
    <div class="label">logo-app-icon</div>
  </div>
  <div class="card">
    <div id="circle">
      <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="48" fill="#F97316"/>
        <path d="M 48 20 C 62 20, 72 30, 72 48 C 72 68, 62 76, 48 76 C 34 76, 24 66, 24 48 C 24 30, 34 20, 48 20 Z" fill="white"/>
        <circle cx="48" cy="48" r="8" fill="#F97316"/>
        <circle cx="48" cy="47" r="3" fill="#FDE68A"/>
      </svg>
    </div>
    <div class="label">logo-circle（圆形图标）</div>
  </div>
  <div class="card">
    <div id="dark">
      <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="96" height="96" rx="22" fill="#1C1917"/>
        <path d="M 48 20 C 62 20, 72 30, 72 48 C 72 68, 62 76, 48 76 C 34 76, 24 66, 24 48 C 24 30, 34 20, 48 20 Z" fill="#F97316"/>
        <circle cx="48" cy="48" r="8" fill="white"/>
        <circle cx="48" cy="47" r="3" fill="#1C1917"/>
      </svg>
    </div>
    <div class="label">logo-dark（深色底反白）</div>
  </div>
</body></html>
