version: '3.8'

services:
  # PostgreSQL 数据库（用户服务）
  postgres:
    image: postgres:15-alpine
    container_name: web_system_postgres
    environment:
      POSTGRES_USER: web_system
      POSTGRES_PASSWORD: web_system123
      POSTGRES_DB: web_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web_network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: web_system_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - web_network
    restart: unless-stopped

  # API 网关
  gateway:
    build:
      context: .
      dockerfile: servers/gateway/Dockerfile
    container_name: web_system_gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - AI_SERVICE_URL=http://ai-service:3003
    depends_on:
      - redis
    networks:
      - web_network
    restart: unless-stopped

  # 认证服务
  auth-service:
    build:
      context: .
      dockerfile: servers/auth-service/Dockerfile
    container_name: web_system_auth_service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=your-secret-key-change-in-production
      - DATABASE_URL=postgresql://web_system:web_system123@postgres:5432/web_system
    depends_on:
      - postgres
      - redis
    networks:
      - web_network
    restart: unless-stopped

  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: servers/user-service/Dockerfile
    container_name: web_system_user_service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://web_system:web_system123@postgres:5432/web_system
    depends_on:
      - postgres
    networks:
      - web_network
    restart: unless-stopped

  # AI 对话服务
  ai-service:
    build:
      context: .
      dockerfile: servers/ai-service/Dockerfile
    container_name: web_system_ai_service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://web_system:web_system123@postgres:5432/web_system
      - HY3_API_KEY=${HY3_API_KEY}
      - HY3_BASE_URL=https://wcode.net/api/gpt/v1
      - IMAGE_GEN_API_URL=${IMAGE_GEN_API_URL:-https://tokenhub.tencentmaas.com}
      - IMAGE_GEN_API_KEY=${IMAGE_GEN_API_KEY}
      - IMAGE_GEN_MODEL=${IMAGE_GEN_MODEL:-stable-diffusion-xl}
    depends_on:
      - postgres
      - redis
    networks:
      - web_network
    restart: unless-stopped

networks:
  web_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
